<!-- External API Connections -->
<section class="card" aria-labelledby="api-connections-heading">
    <h2 id="api-connections-heading">External API Connections</h2>
    <p class="section-desc">Configure optional 3rd-party services to use as grouping sources.</p>

    <form id="api-config-form">
        <div class="form-grid-2">
            <div class="sub-panel">
                <h3 class="sub-panel-heading">Trakt <span class="text-secondary badge-optional">(Optional)</span></h3>
                <p class="sub-panel-text">Create an app at <a href="https://trakt.tv/oauth/applications/new" target="_blank" rel="noopener" class="accent-link">trakt.tv</a>.</p>
                <label class="label-sm">Trakt Client ID <span class="text-secondary">(or env TRAKT_CLIENT_ID)</span></label>
                <input type="text" id="trakt_client_id" placeholder="Your Trakt API Client ID" class="input-sm">
            </div>
            <div class="sub-panel">
                <h3 class="sub-panel-heading">TMDb <span class="text-secondary badge-optional">(Optional)</span></h3>
                <p class="sub-panel-text">Get v3 API Key at <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener" class="accent-link">themoviedb.org</a>.</p>
                <label class="label-sm">TMDb API Key <span class="text-secondary">(or env TMDB_API_KEY)</span></label>
                <input type="text" id="tmdb_api_key" placeholder="Your TMDb API Key" class="input-sm">
            </div>
            <div class="sub-panel">
                <h3 class="sub-panel-heading">MyAnimeList <span class="text-secondary badge-optional">(Optional)</span></h3>
                <p class="sub-panel-text">Get Client ID at <a href="https://myanimelist.net/apiconfig" target="_blank" rel="noopener" class="accent-link">myanimelist.net</a>.</p>
                <label class="label-sm">MAL Client ID <span class="text-secondary">(or env MAL_CLIENT_ID)</span></label>
                <input type="text" id="mal_client_id" placeholder="Your MyAnimeList API Client ID" class="input-sm">
            </div>
        </div>
        <button type="submit" id="save-apis-btn" class="mt-1">
            <span class="loading-spinner"></span>
            <span class="btn-text">Save API Keys</span>
        </button>
    </form>
</section>
