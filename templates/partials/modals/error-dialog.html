<!-- Error Dialog Modal -->
<div id="error-dialog-modal" class="modal" role="dialog" aria-label="Error" aria-modal="true">
    <div class="modal-content error-dialog-top-border">
        <div class="modal-header">
            <h3 class="modal-title error-modal-title">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" class="error-icon">
                    <circle cx="10" cy="10" r="10" fill="var(--error-color)"/>
                    <path d="M6 6L14 14M14 6L6 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Error</span>
            </h3>
            <button type="button" class="close-btn close-modal-btn" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p id="error-dialog-message" class="text-secondary error-dialog-message"></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="secondary-btn close-modal-btn btn-danger-ok">OK</button>
        </div>
    </div>
</div>
