<!-- Generic Confirm Dialog Modal -->
<div id="confirm-dialog-modal" class="modal" role="alertdialog" aria-label="Confirm" aria-modal="true">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="confirm-dialog-title">Confirm</h3>
            <button type="button" class="close-btn close-modal-btn" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirm-dialog-message" class="text-secondary"></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="secondary-btn close-modal-btn" id="confirm-dialog-cancel-btn">Cancel</button>
            <button type="button" class="btn-accent" id="confirm-dialog-ok-btn">Confirm</button>
        </div>
    </div>
</div>
