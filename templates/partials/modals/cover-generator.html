<!-- Cover Generator Modal -->
<div id="cover-generator-modal" class="modal" role="dialog" aria-label="Generate Cover" aria-modal="true">
    <div class="card cover-generator-card" role="dialog" aria-label="Generate Cover" aria-modal="true">
        <h2>Generate Cover (16:9)</h2>
        <div class="cover-controls-grid">
            <div class="cover-text-col">
                <label for="cover-text" class="cover-label">Cover Text</label>
                <input type="text" id="cover-text" oninput="renderCover()" placeholder="Enter group name...">
            </div>
            <div class="cover-col">
                <label for="cover-theme" class="cover-label">Theme</label>
                <select id="cover-theme" onchange="renderCover()">
                    <option value="modern-dark">Dark Gradient (Modern)</option>
                    <option value="vibrant-glow">Vibrant Glow</option>
                    <option value="minimal-glass">Minimal Glassmorphism</option>
                    <option value="cyberpunk">Cyberpunk Night</option>
                    <option value="aurora">Aurora Borealis</option>
                    <option value="monochrome">Monochrome Peak</option>
                    <option value="vintage">Golden Age</option>
                </select>
            </div>
            <div class="cover-col">
                <label for="cover-border-style" class="cover-label">Border Style</label>
                <select id="cover-border-style" onchange="renderCover()">
                    <option value="none">None</option>
                    <option value="elegant">Elegant Thin</option>
                    <option value="bold-frame">Bold Frame</option>
                    <option value="neon-glow">Neon Glow</option>
                    <option value="tech-corners">Sci-Fi Corners</option>
                    <option value="double-inset">Double Inset</option>
                    <option value="corner-brackets">Corner Brackets</option>
                    <option value="industrial-dash">Dashed Industrial</option>
                    <option value="ornate">Ornate Frame</option>
                </select>
            </div>
            <div class="cover-color-picker-group">
                <div>
                    <label for="cover-border-color" class="cover-color-label">Border</label>
                    <input type="color" id="cover-border-color" value="#ffffff" onchange="renderCover()" class="cover-color-input">
                </div>
                <div>
                    <label for="cover-color-1" class="cover-color-label">Color 1</label>
                    <input type="color" id="cover-color-1" value="#4f46e5" onchange="renderCover()" class="cover-color-input">
                </div>
                <div>
                    <label for="cover-color-2" class="cover-color-label">Color 2</label>
                    <input type="color" id="cover-color-2" value="#9333ea" onchange="renderCover()" class="cover-color-input">
                </div>
            </div>
        </div>  <!-- end cover-controls-grid -->
        <div class="cover-preview-area">
            <canvas id="cover-canvas" width="1920" height="1080" class="cover-canvas"></canvas>
        </div>
        <div class="cover-actions">
            <button type="button" id="apply-cover-btn" class="cover-btn-primary">Apply Cover</button>
            <button type="button" id="download-cover-btn" class="secondary-btn cover-btn-secondary">Download</button>
            <button type="button" class="secondary-btn close-modal-btn cover-btn-tertiary">Cancel</button>
        </div>
    </div>
</div>
