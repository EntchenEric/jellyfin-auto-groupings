<!-- Confirm Sync Modal -->
<div id="confirm-sync-modal" class="modal" role="dialog" aria-label="Confirm Sync" aria-modal="true">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Confirm Sync</h3>
            <button type="button" class="close-btn close-modal-btn" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p class="text-secondary confirm-sync-body-text">
                This will create/update symlinks for <strong id="confirm-sync-group-count">0</strong> groupings
                (<span id="confirm-sync-item-count">0</span> potential media items).
            </p>
            <p class="text-warning confirm-sync-warning-text">
                All existing symlink folders will be rebuilt. This cannot be undone.
            </p>
            <label class="checkbox-label small-mt">
                <input type="checkbox" id="confirm-sync-skip-next">
                <span>Don't ask again</span>
            </label>
        </div>
        <div class="modal-footer">
            <button type="button" class="secondary-btn close-modal-btn">Cancel</button>
            <button type="button" id="confirm-sync-preview-btn" class="secondary-btn">Preview First</button>
            <button type="button" id="confirm-sync-go-btn" class="btn-accent">Sync Now</button>
        </div>
    </div>
</div>
