name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Which version or commit are you running?
      placeholder: e.g., v1.2.3 or commit abc1234
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy any relevant log output
      render: shell
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your config.json (with sensitive values redacted)
      render: json