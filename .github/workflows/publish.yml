name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # actions/checkout@v6 → pinned SHA for supply-chain security
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.3
        with:
          persist-credentials: false

      # docker/setup-qemu-action@v4 → pinned SHA
      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      # docker/setup-buildx-action@v4 → pinned SHA
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # docker/login-action@v4 → pinned SHA
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/build-push-action@v7 → pinned SHA
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/entcheneric/jellyfin-groupings:latest, ghcr.io/entcheneric/jellyfin-groupings:${{ github.sha }}