name: Virtual Jellyfin Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test-virtual:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
    # actions/checkout@v6 → pinned SHA for supply-chain security
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.3
      with:
        persist-credentials: false
    # actions/setup-python@v6 → pinned SHA
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}
    # actions/cache@v5 → pinned SHA
    - name: Cache pip packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    - name: Run Virtual Jellyfin Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/test_virtual_jellyfin_api.py tests/test_virtual_jellyfin_exhaustive.py tests/test_deep_sync.py
