# ─────────────────────────────────────────────────────────────
# docker-compose.yml  –  Deployment for Jellyfin Groupings
# ─────────────────────────────────────────────────────────────

services:
  jellyfin-groupings:
    image: ghcr.io/entcheneric/jellyfin-groupings:${TAG:-latest}
    # build: . # Uncomment this if you want to build from source locally
    container_name: jellyfin-groupings
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Use environment variables for sensitive API keys instead of
      # storing them in plaintext in config/config.json.
      # Values set here override whatever is in the config file.
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - TRAKT_CLIENT_ID=${TRAKT_CLIENT_ID:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MAL_CLIENT_ID=${MAL_CLIENT_ID:-}
      # Override the AniList GraphQL API URL (e.g., for self-hosted proxies):
      # - ANILIST_API_URL=https://graphql.anilist.co
      # Set a password to enable HTTP Basic Auth on the web UI:
      # - APP_PASSWORD=${APP_PASSWORD:-}
      # Uncomment to override the Flask server port (default: 5000):
      # - FLASK_PORT=5000
      # Uncomment to disable debug mode in production (default: false):
      # - FLASK_DEBUG=false
      # Override HTTP retry behaviour for external API calls:
      # - NETWORK_RETRY_TOTAL=3
      # - NETWORK_RETRY_BACKOFF_FACTOR=1.0
      # - NETWORK_RETRY_STATUS_FORCELIST=429,500,502,503,504
      # Comma-separated Flask endpoint names exempt from the X-Requested-With CSRF check:
      # - ALLOWED_NON_CSRF_ENDPOINTS=main.webhook,main.callback
      # Control log verbosity (DEBUG, INFO, WARNING, ERROR, CRITICAL; default: INFO):
      # - LOG_LEVEL=INFO
      # Gunicorn worker timeout in seconds for long-running sync (default: 120):
      # - GUNICORN_TIMEOUT=120
      # Number of gunicorn worker processes (default: 2):
      # - GUNICORN_WORKERS=2
    volumes:
      # 1. Config persistence
      # Stores your API keys and group definitions. 
      # The app auto-creates config.json on first start.
      - ./config:/app/config

      # 2. Output directory (Virtual Root)
      # This is where the symlink folders will be created.
      # IMPORTANT: This same host path MUST be mounted in your Jellyfin container.
      # In the Web UI, set "Base Target Path" to: /groupings
      - /path/to/your/groupings-virtual:/groupings

      # 3. Media root
      # Mount your real media folder here so the container can verify symlink targets.
      # In the Web UI, set "Same path on this machine" to: /media
      # - /path/to/your/media:/media:ro

      # 4. Local covers directory (optional — library-local .covers/ takes
      #    precedence; this is the legacy fallback location)
      # - ./config/covers:/app/config/covers

      # 5. Application logs (optional but helpful for troubleshooting)
      # Logs are written to /app/logs/jellyfin-groupings.log by default.
      # - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
