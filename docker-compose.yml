# ─────────────────────────────────────────────────────────────
# docker-compose.yml  –  Deployment for Jellyfin Groupings
# ─────────────────────────────────────────────────────────────

services:
  jellyfin-groupings:
    image: ghcr.io/entcheneric/jellyfin-groupings:latest
    # build: . # Uncomment this if you want to build from source locally
    container_name: jellyfin-groupings
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Optional HTTP Basic Auth password for the web UI and API (except / and /test).
      # - APP_PASSWORD=${APP_PASSWORD:-}
      # Host port override when running outside Docker (default 5000).
      # - FLASK_PORT=5000
      # Background scheduler: enabled by default. Set to 0 on extra gunicorn workers
      # when GUNICORN_WORKERS>1, or use DISABLE_SCHEDULER=1 to disable entirely.
      # - SCHEDULER_ENABLED=1
      # - DISABLE_SCHEDULER=0
      # Gunicorn worker count (default 1 in the image; raise only if SCHEDULER_ENABLED=0 on workers 2+).
      # - GUNICORN_WORKERS=1
      # Use environment variables for sensitive API keys instead of
      # storing them in plaintext in config/config.json.
      # Values set here override whatever is in the config file.
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - TRAKT_CLIENT_ID=${TRAKT_CLIENT_ID:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - MAL_CLIENT_ID=${MAL_CLIENT_ID:-}
      # Uncomment to disable debug mode in production:
      # - FLASK_DEBUG=false
    volumes:
      # 1. Config persistence
      # Stores your API keys and group definitions. 
      # The app auto-creates config.json on first start.
      - ./config:/app/config

      # 2. Output directory (Virtual Root)
      # This is where the symlink folders will be created.
      # IMPORTANT: This same host path MUST be mounted in your Jellyfin container.
      # In the Web UI, set "Base Target Path" to: /groupings
      - /path/to/your/groupings-virtual:/groupings

      # 3. Media root
      # Mount your real media folder here so the container can verify symlink targets.
      # In the Web UI, set "Same path on this machine" to: /media
      # - /path/to/your/media:/media:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
